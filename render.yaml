databases:
  - name: breathe-esg-db
    plan: starter
    databaseName: breathe_esg
    user: breathe_esg_user

services:
  # Django REST API backend
  - type: web
    name: breathe-esg-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn breathe_esg.wsgi --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.3"

  # React frontend static site
  - type: web
    name: breathe-esg-dashboard
    runtime: static
    plan: starter
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
