name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - 'nixpacks.toml'
      - 'railway.json'
      - 'render.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Render deploy triggered successfully."

      - name: No deploy hook configured
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "⚠️  RENDER_DEPLOY_HOOK_URL secret not set."
          echo "Set it in GitHub repo → Settings → Secrets → Actions."
          echo "Get it from Render dashboard → your service → Settings → Deploy Hook."
