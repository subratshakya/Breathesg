[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["cd backend && pip install -r requirements.txt"]

[phases.build]
cmds = [
  "cd backend && python manage.py collectstatic --no-input",
  "cd backend && python manage.py migrate",
  "cd backend && python manage.py seed_data"
]

[start]
cmd = "cd backend && gunicorn breathe_esg.wsgi --bind 0.0.0.0:$PORT --workers 2"
